description: SBUS Receiver

compatible: "sbus-receiver"

include: uart-device.yaml

properties:
  continue-on-frame-lost:
    type: boolean
    description: Continue generating events when SBUS reports frame lost

  continue-on-fale-safe:
    type: boolean
    description: Continue generating events when SBUS reports fale safe

child-binding:
  description: GPIO KEYS child node
  properties:
    channel:
      type: int
      required: true
      description: channel number

    zephyr,axis:
      type: int
      required: true
      description: |
        The input code for the axis to report for the device, typically any of
        INPUT_REL_*.
