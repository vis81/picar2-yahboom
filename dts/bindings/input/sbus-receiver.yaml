description: SBUS Receiver

compatible: "sbus-receiver"

include: uart-device.yaml

properties:
  continue-on-frame-lost:
    type: boolean
    description: Continue generating events when SBUS reports frame lost

  continue-on-failsafe:
    type: boolean
    description: Continue generating events when SBUS reports failsafe

child-binding:
  description: SBUS channel node
  properties:
    channel:
      type: int
      required: true
      description: SBUS channel number (1-16)

    zephyr,axis:
      type: int
      required: true
      description: |
        The input code for the axis to report for the device, typically any of
        INPUT_ABS_* or INPUT_REL_*.
