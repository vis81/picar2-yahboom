description: STM32 software PWM — uses a hardware timer for timing but drives arbitrary GPIOs

compatible: "st,stm32-pwm-sw"

include: [pwm-controller.yaml, base.yaml]

properties:
  gpios:
    type: phandle-array
    required: true

  channels:
    type: array
    required: true
    description: Timer channel number (1-based) for each GPIO in the gpios array

  "#pwm-cells":
    const: 3
    description: |
      Number of items to expect in a PWM specifier:
      - channel: timer channel number (matches an entry in the channels array)
      - period: period in nanoseconds
      - flags: PWM_POLARITY_NORMAL or PWM_POLARITY_INVERTED

pwm-cells:
  - channel
  - period
  - flags
