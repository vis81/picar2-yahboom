description: PWM-controlled servo motor

compatible: "pwm-servo"

include: base.yaml

properties:
  status:
    required: true
    type: string
    description: Human readable string describing the device's status

  init_value:
    type: int
    description: Initial position value [0, 100]
    required: true

  min_pulse_us:
    type: int
    description: Minimum pulse width in microseconds
    required: true

  max_pulse_us:
    type: int
    description: Maximum pulse width in microseconds
    required: true

  pwms:
    required: true
    type: phandle-array
    description: PWM specifier driving the servo motor.
