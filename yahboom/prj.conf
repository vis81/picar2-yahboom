CONFIG_ADC=y

CONFIG_SENSOR=y
CONFIG_QDEC_STM32=y
CONFIG_STM32_TEMP=y

CONFIG_MOTOR=y
CONFIG_MOTOR_HBRIDGE=y

CONFIG_SHELL=y
#CONFIG_SHELL_GETOPT=y
CONFIG_PWM_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_SENSOR_SHELL=y
CONFIG_ADC_SHELL=y
CONFIG_SETTINGS_SHELL=y

CONFIG_THREAD_ANALYZER=y
#CONFIG_THREAD_ANALYZER_USE_PRINTK=y
#CONFIG_THREAD_ANALYZER_AUTO=y
#CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=5

CONFIG_LOG=y
CONFIG_MOTOR_LOG_LEVEL_DBG=y

CONFIG_PICOLIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_ISR_STACK_SIZE=1024
CONFIG_REBOOT=y

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y
CONFIG_RING_BUFFER=y

# Shell UART backend buffers — 64-byte RX default overflows on paste and
# triggers LOG_WRN from ISR context; with LOG_MODE_IMMEDIATE that formats
# a string synchronously taking >10 µs, causing UART overrun (ORE) at
# 921600 baud and eating the next byte — exactly how ESC[A loses its '['.
# 256-byte RX prevents overflow; 256-byte TX prevents echo stalls.
# Suppress shell_uart WRN so even a future overflow won't re-enter msg_process
# from ISR with immediate-mode logging active.
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=256
CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=256
CONFIG_SHELL_BACKEND_SERIAL_LOG_LEVEL_ERR=y
# Use DMA async API for the shell UART so the DMA controller handles every
# byte; eliminates per-byte RXNE ISR and the ORE overrun it caused at 921600.
CONFIG_SHELL_ASYNC_API=y
CONFIG_SHELL_BACKEND_SERIAL_ASYNC_RX_BUFFER_SIZE=64
