manifest:
  defaults:
    remote: zephyrproject-rtos

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      revision: v3.5.0
      path: zephyr_os/zephyr
      import:
        name-allowlist:
          - cmsis
          - hal_stm32
          - mcuboot
        path-prefix: zephyr_os   # redirects all imported modules under zephyr_os/

  self:
    west-commands: scripts/west-commands.yml
